{% extends "base.html" %}
{% block title %}Apply profile{% endblock %}
{% block content %}
<h1>Apply profile</h1>
{% if request.query_params.get('saved') %}<p class="banner success">Saved.</p>{% endif %}
<form method="post" action="/profile" class="form card">
  <label>Full name <input name="full_name" value="{{ profile.full_name or '' }}" required /></label>
  <label>Email <input name="email" type="email" value="{{ profile.email or '' }}" required /></label>
  <label>Phone <input name="phone" value="{{ profile.phone or '' }}" /></label>
  <label>LinkedIn URL <input name="linkedin_url" value="{{ profile.linkedin_url or '' }}" /></label>
  <label>Work authorization <input name="work_authorization" value="{{ profile.work_authorization or '' }}" /></label>
  <label>Cover letter template<textarea name="cover_letter_template" rows="12">{{ profile.cover_letter_template or '' }}</textarea></label>
  <label>Default answers JSON<textarea name="answers_defaults_json" rows="8" class="code">{{ answers_defaults_json }}</textarea></label>
  <button type="submit">Save</button>
</form>
{% endblock %}
