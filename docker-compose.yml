services:
  mock-contact:
    build: ./docker/mock-contact
    expose:
      - '8001'
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health')"
        ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  chat:
    build:
      context: .
      dockerfile: docker/chat/Dockerfile
    environment:
      CHAT_PROVIDER: mock
    expose:
      - '8000'
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"
        ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  proxy:
    image: nginx:alpine
    ports:
      - '8080:80'
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - .:/usr/share/nginx/html:ro
    depends_on:
      mock-contact:
        condition: service_healthy
      chat:
        condition: service_healthy
