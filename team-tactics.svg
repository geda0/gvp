<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-labelledby="ttTitle ttDesc">
  <title id="ttTitle">Team Tactics: hooks-gated red-to-green TDD pairing</title>
  <desc id="ttDesc">An orchestrator runs a red-to-green TDD loop — a test-writer writes one failing test and an implementer makes it pass — while hooks referee every edit by phase and layer, blocking anything out of scope and never finishing on a red bar. Each handoff is recorded on a live tic bus. Open, composable kit for Claude Code.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="hub" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#93c5fd"/>
    </marker>
    <marker id="arrowLoop" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#5eead4"/>
    </marker>
    <style>
      @media (prefers-reduced-motion: reduce) { .pulse { animation: none !important; opacity: 0.85; } }
      .pulse { animation: ttpulse 2.4s ease-in-out infinite; }
      @keyframes ttpulse { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }
      text { font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    </style>
  </defs>

  <rect width="800" height="450" rx="14" fill="url(#bg)"/>
  <rect x="10" y="10" width="780" height="430" rx="12" fill="none" stroke="#334155" stroke-width="1"/>

  <!-- Header -->
  <text x="400" y="54" text-anchor="middle" fill="#f8fafc" font-size="28" font-weight="700">Team Tactics</text>
  <text x="400" y="80" text-anchor="middle" fill="#94a3b8" font-size="13.5">Composable TDD harness for Claude Code &#183; hooks referee &#183; live tic bus</text>

  <!-- The loop: HOOKS (referee) -> Orchestrator -> the pair, with a verdict loop-back -->
  <rect x="58" y="150" width="156" height="110" rx="12" fill="#141c2e" stroke="#475569"/>
  <text x="136" y="180" text-anchor="middle" fill="#cbd5e1" font-size="14" font-weight="700">HOOKS</text>
  <text x="136" y="199" text-anchor="middle" fill="#7c8aa0" font-size="11">the referee</text>
  <text x="136" y="222" text-anchor="middle" fill="#e2e8f0" font-size="12">phase &#215; layer</text>
  <text x="136" y="242" text-anchor="middle" fill="#94a3b8" font-size="10.5">no finish on red</text>

  <circle cx="400" cy="205" r="58" fill="url(#hub)"/>
  <text x="400" y="201" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="700">Orchestrator</text>
  <text x="400" y="221" text-anchor="middle" class="mono" fill="#dbeafe" font-size="12">red &#8594; green</text>

  <rect x="586" y="152" width="156" height="48" rx="10" fill="#2a1518" stroke="#f87171"/>
  <text x="606" y="174" fill="#fecaca" font-size="13" font-weight="600">test-writer</text>
  <text x="606" y="191" class="mono" fill="#fca5a5" font-size="10">RED &#183; failing test</text>

  <rect x="586" y="208" width="156" height="48" rx="10" fill="#0b2418" stroke="#4ade80"/>
  <text x="606" y="230" fill="#bbf7d0" font-size="13" font-weight="600">implementer</text>
  <text x="606" y="247" class="mono" fill="#86efac" font-size="10">GREEN &#183; make it pass</text>

  <!-- forward arrows -->
  <path d="M222 205 L338 205" fill="none" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M462 205 L580 205" fill="none" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- verdict loop-back (shows it cycles) -->
  <path d="M664 258 C 604 296, 470 296, 404 262" fill="none" stroke="#5eead4" stroke-width="2" stroke-dasharray="5 4" opacity="0.85" marker-end="url(#arrowLoop)"/>
  <text x="534" y="288" text-anchor="middle" class="mono" fill="#5eead4" font-size="11">run-suite &#8594; verdict &#8634;</text>

  <!-- Tic bus -->
  <rect x="58" y="304" width="684" height="42" rx="10" fill="#0f172a" stroke="#334155"/>
  <text x="76" y="330" class="mono" fill="#5eead4" font-size="12" font-weight="600">TIC BUS</text>
  <circle class="pulse" cx="150" cy="325" r="4" fill="#34d399"/>
  <text x="160" y="329" class="mono" fill="#6ee7b7" font-size="10">live</text>
  <g class="mono" font-size="11">
    <rect x="214" y="314" width="86" height="22" rx="5" fill="#172554" stroke="#3b82f6"/>
    <text x="224" y="329" fill="#bfdbfe">delegate</text>
    <rect x="312" y="314" width="80" height="22" rx="5" fill="#422006" stroke="#f59e0b"/>
    <text x="322" y="329" fill="#fde68a">handoff</text>
    <rect x="404" y="314" width="62" height="22" rx="5" fill="#451a03" stroke="#fb923c"/>
    <text x="414" y="329" fill="#fed7aa">claim</text>
    <rect x="478" y="314" width="56" height="22" rx="5" fill="#450a0a" stroke="#f87171"/>
    <text x="489" y="329" fill="#fecaca">RED</text>
    <rect x="546" y="314" width="72" height="22" rx="5" fill="#052e16" stroke="#4ade80"/>
    <text x="556" y="329" fill="#bbf7d0">GREEN</text>
  </g>

  <!-- Footer -->
  <text x="400" y="384" text-anchor="middle" class="mono" fill="#5eead4" font-size="13">npx github:geda0/team-tactics</text>
  <text x="400" y="408" text-anchor="middle" fill="#94a3b8" font-size="11.5">composable kit &#183; fail-closed gates &#183; one-behavior slices &#183; parallel-safe handoffs</text>
</svg>
