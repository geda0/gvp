<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-labelledby="ttTitle ttDesc">
  <title id="ttTitle">Team Tactics: composable TDD agent harness</title>
  <desc id="ttDesc">Diagram of the Team Tactics harness. Three composable layers — the tic protocol (@ttics/tics), the TDD pairing gate (@ttics/tdd), and the full team (team-tactics) — wrap a red-to-green inner loop where hooks gate every edit by phase and layer while an orchestrator pairs a test-writer and an implementer. Parallel pairs auto-claim the files they touch and open sections so they never collide, and a live tic bus records delegate, handoff, claim, section, red, green and verdict events.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="hub" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#93c5fd"/>
    </marker>
    <style>
      @media (prefers-reduced-motion: reduce) {
        .pulse { animation: none !important; opacity: 0.85; }
      }
      .pulse { animation: ttpulse 2.4s ease-in-out infinite; }
      @keyframes ttpulse { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }
      text { font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    </style>
  </defs>

  <rect width="800" height="450" rx="14" fill="url(#bg)"/>
  <rect x="10" y="10" width="780" height="430" rx="12" fill="none" stroke="#334155" stroke-width="1"/>

  <!-- Header -->
  <text x="30" y="44" fill="#f8fafc" font-size="25" font-weight="700">Team Tactics</text>
  <text x="30" y="66" fill="#94a3b8" font-size="12.5">Composable TDD agent harness &#183; tic protocol &#183; safe parallel pairs</text>
  <rect x="664" y="28" width="106" height="24" rx="12" fill="#0f172a" stroke="#334155"/>
  <circle cx="681" cy="40" r="4" fill="#34d399"/>
  <text x="692" y="44" fill="#94a3b8" font-size="11">open source</text>

  <!-- ===== Column 1: COMPOSE (the three layers) ===== -->
  <text x="30" y="100" class="mono" fill="#5eead4" font-size="11" letter-spacing="0.06em">COMPOSE &#8212; adopt layer by layer</text>
  <rect x="30" y="110" width="200" height="40" rx="8" fill="#312e81" stroke="#818cf8"/>
  <text x="44" y="129" fill="#e0e7ff" font-size="13" font-weight="600">team-tactics</text>
  <text x="44" y="144" fill="#a5b4fc" font-size="10.5">full team &#183; outer loop &#183; release gate</text>

  <rect x="30" y="156" width="200" height="40" rx="8" fill="#1e3a8a" stroke="#60a5fa"/>
  <text x="44" y="175" class="mono" fill="#bfdbfe" font-size="12.5" font-weight="600">@ttics/tdd</text>
  <text x="44" y="190" fill="#93c5fd" font-size="10.5">pairing gate &#183; phase &#215; layer hooks</text>

  <rect x="30" y="202" width="200" height="40" rx="8" fill="#134e4a" stroke="#2dd4bf"/>
  <text x="44" y="221" class="mono" fill="#99f6e4" font-size="12.5" font-weight="600">@ttics/tics</text>
  <text x="44" y="236" fill="#5eead4" font-size="10.5">tic protocol &#183; coordination bus</text>

  <!-- ===== Column 2: RED -> GREEN inner loop ===== -->
  <text x="258" y="100" font-size="11" letter-spacing="0.06em"><tspan fill="#f87171" font-weight="700">RED</tspan><tspan fill="#94a3b8"> &#8594; </tspan><tspan fill="#4ade80" font-weight="700">GREEN</tspan><tspan fill="#94a3b8"> INNER LOOP</tspan></text>

  <rect x="258" y="110" width="104" height="132" rx="9" fill="#141c2e" stroke="#64748b"/>
  <text x="272" y="132" fill="#cbd5e1" font-size="12" font-weight="600">HOOKS</text>
  <text x="272" y="153" fill="#e2e8f0" font-size="11">phase &#215; layer</text>
  <text x="272" y="171" fill="#94a3b8" font-size="10">no src in red</text>
  <text x="272" y="187" fill="#94a3b8" font-size="10">no test in green</text>
  <text x="272" y="203" fill="#94a3b8" font-size="10">no finish on red</text>
  <text x="272" y="227" class="mono" fill="#5eead4" font-size="10">run-suite&#8594;verdict</text>

  <circle cx="448" cy="150" r="40" fill="url(#hub)"/>
  <text x="448" y="147" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700">Orchestrator</text>
  <text x="448" y="163" text-anchor="middle" class="mono" fill="#dbeafe" font-size="10.5">red &#8594; green</text>

  <rect x="386" y="200" width="142" height="20" rx="6" fill="#1e3a5f" stroke="#60a5fa"/>
  <text x="400" y="214" fill="#bfdbfe" font-size="11" font-weight="600">test-writer</text>
  <text x="514" y="214" text-anchor="end" class="mono" fill="#7dd3fc" font-size="9">red</text>
  <rect x="386" y="224" width="142" height="20" rx="6" fill="#14532d" stroke="#4ade80"/>
  <text x="400" y="238" fill="#bbf7d0" font-size="11" font-weight="600">implementer</text>
  <text x="514" y="238" text-anchor="end" class="mono" fill="#86efac" font-size="9">green</text>

  <path d="M362 150 L406 150" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M448 190 L448 198" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== Column 3: PARALLEL PAIRS (auto-claim + sections) ===== -->
  <text x="560" y="100" fill="#fbbf24" font-size="11" letter-spacing="0.06em">PARALLEL PAIRS</text>
  <rect x="560" y="110" width="210" height="46" rx="8" fill="#1c1917" stroke="#f59e0b"/>
  <text x="574" y="130" fill="#fde68a" font-size="12" font-weight="600">Pair A</text>
  <text x="574" y="147" class="mono" fill="#fcd34d" font-size="10">claims contact.py &#183; &#167;S1</text>
  <rect x="560" y="162" width="210" height="46" rx="8" fill="#1c1917" stroke="#f59e0b"/>
  <text x="574" y="182" fill="#fde68a" font-size="12" font-weight="600">Pair B</text>
  <text x="574" y="199" class="mono" fill="#fcd34d" font-size="10">claims chat.py &#183; &#167;S2</text>
  <text x="560" y="228" fill="#94a3b8" font-size="10.5">auto-claim + sections &#8594;</text>
  <text x="560" y="242" fill="#5eead4" font-size="10.5" font-weight="600">collision-safe by construction</text>

  <!-- ===== Tic bus rail ===== -->
  <rect x="26" y="262" width="748" height="56" rx="10" fill="#0f172a" stroke="#475569"/>
  <text x="42" y="282" class="mono" fill="#5eead4" font-size="11" font-weight="600" letter-spacing="0.06em">TIC BUS</text>
  <circle class="pulse" cx="116" cy="278" r="4" fill="#34d399"/>
  <text x="126" y="282" class="mono" fill="#6ee7b7" font-size="10">live</text>
  <g class="mono" font-size="11">
    <rect x="42" y="290" width="92" height="20" rx="5" fill="#172554" stroke="#3b82f6"/>
    <text x="52" y="304" fill="#bfdbfe">delegate</text>
    <rect x="142" y="290" width="82" height="20" rx="5" fill="#422006" stroke="#f59e0b"/>
    <text x="152" y="304" fill="#fde68a">handoff</text>
    <rect x="232" y="290" width="66" height="20" rx="5" fill="#451a03" stroke="#fb923c"/>
    <text x="242" y="304" fill="#fed7aa">claim</text>
    <rect x="306" y="290" width="84" height="20" rx="5" fill="#3b0764" stroke="#a855f7"/>
    <text x="316" y="304" fill="#e9d5ff">section</text>
    <rect x="398" y="290" width="58" height="20" rx="5" fill="#450a0a" stroke="#f87171"/>
    <text x="408" y="304" fill="#fecaca">RED</text>
    <rect x="464" y="290" width="74" height="20" rx="5" fill="#052e16" stroke="#4ade80"/>
    <text x="474" y="304" fill="#bbf7d0">GREEN</text>
    <rect x="546" y="290" width="82" height="20" rx="5" fill="#042f2e" stroke="#2dd4bf"/>
    <text x="556" y="304" fill="#99f6e4">verdict</text>
  </g>
  <text x="760" y="304" text-anchor="end" class="mono" fill="#475569" font-size="10">tics.jsonl</text>

  <!-- ===== Footer ===== -->
  <rect x="26" y="334" width="748" height="98" rx="10" fill="#0f172a" stroke="#334155"/>
  <text x="42" y="362" fill="#e2e8f0" font-size="14" font-weight="600">Open, composable kit &#8212; powering the agents that build this site</text>
  <text x="42" y="388" class="mono" fill="#5eead4" font-size="12.5">npx github:geda0/team-tactics</text>
  <text x="42" y="412" fill="#94a3b8" font-size="11.5">fail-closed gates &#183; one-behavior slices &#183; collision-safe parallel fan-out</text>
  <text x="760" y="388" text-anchor="end" class="mono" fill="#64748b" font-size="10.5">tics &#8594; @ttics/tdd &#8594; team-tactics</text>
  <text x="760" y="412" text-anchor="end" fill="#475569" font-size="10.5">progressive adoption</text>
</svg>
