<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-labelledby="ttTitle ttDesc">
  <title id="ttTitle">Team Tactics: hooks, agents, and live tics</title>
  <desc id="ttDesc">Diagram of the Team Tactics harness. An orchestrator runs red and green cycles while hooks enforce phase and layer scope. Role agents write tests and code. A live tic bus records delegate, handoff, and suite signals.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="hub" x1="360" y1="160" x2="440" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#93c5fd"/>
    </marker>
    <style>
      @media (prefers-reduced-motion: reduce) {
        .motion { animation: none !important; }
        .pulse { display: none; }
      }
      .pulse { animation: pulse 2.4s ease-in-out infinite; }
      @keyframes pulse { 0%,100% { opacity: 0.35; } 50% { opacity: 1; } }
    </style>
  </defs>

  <rect width="800" height="450" rx="14" fill="url(#bg)"/>
  <rect x="10" y="10" width="780" height="430" rx="12" fill="none" stroke="#334155" stroke-width="1"/>

  <!-- Title -->
  <text x="400" y="48" text-anchor="middle" fill="#f8fafc" font-family="ui-sans-serif,system-ui,sans-serif" font-size="26" font-weight="700">Team Tactics</text>
  <text x="400" y="72" text-anchor="middle" fill="#94a3b8" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13">fail-closed TDD &#183; composable layers &#183; live tic bus</text>

  <!-- Tic bus -->
  <rect x="40" y="92" width="720" height="72" rx="10" fill="#0f172a" stroke="#475569"/>
  <text x="56" y="116" fill="#5eead4" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" font-weight="600" letter-spacing="0.06em">TIC BUS</text>
  <circle class="pulse motion" cx="728" cy="108" r="5" fill="#34d399"/>
  <text x="740" y="112" fill="#6ee7b7" font-family="ui-monospace,monospace" font-size="11">live</text>

  <g font-family="ui-monospace,monospace" font-size="12">
    <rect x="56" y="128" width="200" height="28" rx="6" fill="#172554" stroke="#3b82f6"/>
    <text x="68" y="147" fill="#bfdbfe">delegate</text>

    <rect x="272" y="128" width="200" height="28" rx="6" fill="#422006" stroke="#f59e0b"/>
    <text x="284" y="147" fill="#fde68a">handoff</text>

    <rect x="488" y="128" width="120" height="28" rx="6" fill="#450a0a" stroke="#f87171"/>
    <text x="500" y="147" fill="#fecaca">RED</text>

    <rect x="624" y="128" width="120" height="28" rx="6" fill="#052e16" stroke="#4ade80"/>
    <text x="636" y="147" fill="#bbf7d0">GREEN</text>
  </g>

  <!-- Core loop -->
  <g transform="translate(120,200)">
    <rect width="180" height="100" rx="10" fill="#141c2e" stroke="#64748b"/>
    <text x="16" y="28" fill="#94a3b8" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" font-weight="600">HOOKS</text>
    <text x="16" y="52" fill="#e2e8f0" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13">phase &#215; layer gate</text>
    <text x="16" y="76" fill="#cbd5e1" font-family="ui-monospace,monospace" font-size="12">run-suite &#8594; verdict</text>
  </g>

  <g transform="translate(310,188)">
    <circle cx="90" cy="58" r="54" fill="url(#hub)"/>
    <text x="90" y="54" text-anchor="middle" fill="#fff" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="700">Orchestrator</text>
    <text x="90" y="72" text-anchor="middle" fill="#dbeafe" font-family="ui-monospace,monospace" font-size="11">red &#8594; green</text>
  </g>

  <g transform="translate(500,200)">
    <rect width="180" height="44" rx="8" fill="#1e3a5f" stroke="#60a5fa"/>
    <text x="16" y="28" fill="#93c5fd" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="600">test-writer</text>
    <rect y="52" width="180" height="44" rx="8" fill="#14532d" stroke="#4ade80"/>
    <text x="16" y="80" fill="#86efac" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="600">implementer</text>
  </g>

  <!-- Flow arrows -->
  <path d="M300 250 L310 248" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M490 250 L500 248" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Footer -->
  <rect x="40" y="330" width="720" height="96" rx="10" fill="#0f172a" stroke="#334155"/>
  <text x="56" y="358" fill="#e2e8f0" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="600">Install in any Claude Code project</text>
  <text x="56" y="382" fill="#94a3b8" font-family="ui-monospace,monospace" font-size="12">npx tics &#183; npx tics --preset full-team</text>
  <text x="56" y="406" fill="#64748b" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12">fail-closed gate &#183; collision-free pairing &#183; every handoff on the tic bus</text>
</svg>
