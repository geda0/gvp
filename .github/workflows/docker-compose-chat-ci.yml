name: Docker compose and chat tests

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  docker-compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate compose file
        run: docker compose config

      - name: Build compose services
        run: docker compose build

  chat-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install chat dependencies
        working-directory: docker/chat
        run: python -m pip install -r requirements.txt

      - name: Run chat pytest suite
        working-directory: docker/chat
        run: PYTHONPATH=. python -m pytest tests -v
