version = 0.1

# Local deploy defaults only — no secrets or personal data in repo.
# Use `bash scripts/integrate-and-deploy.sh [prod|stage]` or pass --parameter-overrides for real values.
[default.deploy.parameters]
stack_name = "page"
resolve_s3 = true
s3_prefix = "page"
confirm_changeset = false
capabilities = "CAPABILITY_IAM"
image_repositories = []

[default.global.parameters]
region = "us-east-2"
