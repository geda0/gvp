AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Portfolio chat API (FastAPI + Gemini on Lambda container, HTTP API).

Parameters:
  GeminiApiKey:
    Type: String
    NoEcho: true
    Default: 'GEMINI-KEY-PLACEHOLDER'
    Description: Google AI Studio / Gemini API key (replace placeholder for real traffic).
  GeminiModel:
    Type: String
    Default: gemini-3.1-flash-lite
    Description: >
      Primary Gemini API model id (see https://ai.google.dev/gemini-api/docs/models ).
      Default Gemini 3.1 Flash Lite (gemini-3.1-flash-lite).
  GeminiFallbackModel:
    Type: String
    Default: gemma-4-26b-a4b-it
    Description: >
      Fallback model when the primary returns rate limits (429 / quota). Default Gemma 4 26B A4B IT.
  ChatCorsOrigins:
    Type: String
    Default: 'https://chat.marwanelgendy.link,https://marwanelgendy.link'
    Description: Comma-separated browser origins for API Gateway CORS (and CHAT_CORS_ORIGINS in the function).
  ChatTranscriptsTableName:
    Type: String
    Default: ''
    Description: Optional external DynamoDB table for transcript persistence (from contact stack output).

Conditions:
  HasChatTranscriptsTable: !Not [!Equals [!Ref ChatTranscriptsTableName, '']]

Globals:
  Function:
    Timeout: 60
    MemorySize: 1536
    Architectures:
      - x86_64

Resources:
  ChatHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowMethods: [OPTIONS, GET, POST]
        AllowHeaders: [Content-Type, Authorization]
        AllowOrigins: !Split [',', !Ref ChatCorsOrigins]

  ChatFunction:
    Type: AWS::Serverless::Function
    Metadata:
      DockerContext: ../
      Dockerfile: docker/chat/Dockerfile.lambda
    Properties:
      PackageType: Image
      Policies:
        - !If
          - HasChatTranscriptsTable
          - Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                Resource: !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${ChatTranscriptsTableName}
          - !Ref AWS::NoValue
      Environment:
        Variables:
          CHAT_PROVIDER: gemini
          GEMINI_API_KEY: !Ref GeminiApiKey
          GEMINI_MODEL: !Ref GeminiModel
          GEMINI_FALLBACK_MODEL: !Ref GeminiFallbackModel
          CHAT_CORS_ORIGINS: !Ref ChatCorsOrigins
          CHAT_TRANSCRIPTS_TABLE: !Ref ChatTranscriptsTableName
      Events:
        RootAny:
          Type: HttpApi
          Properties:
            ApiId: !Ref ChatHttpApi
            Path: /
            Method: ANY
        ProxyAny:
          Type: HttpApi
          Properties:
            ApiId: !Ref ChatHttpApi
            Path: /{proxy+}
            Method: ANY

Outputs:
  ChatPostApiUrl:
    Description: Full URL for hero chat fetch (POST JSON) — use in gvp:chat-api-url meta.
    Value: !Sub https://${ChatHttpApi}.execute-api.${AWS::Region}.amazonaws.com/api/chat
  ChatHttpApiId:
    Value: !Ref ChatHttpApi
  ChatApiBaseUrl:
    Value: !Sub https://${ChatHttpApi}.execute-api.${AWS::Region}.amazonaws.com
