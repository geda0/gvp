AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Portfolio chat on Amazon ECS Express Mode (ADR-0007 Phase 3, revised). App Runner
  entered maintenance mode (no new customers from 2026-04-30, no new features), so the
  interim App Runner stack is a dead end. ECS Express Mode is AWS's managed successor:
  the same "image + port -> HTTPS" experience (Fargate task, ALB + AWS-managed TLS,
  autoscaling, security groups and CloudWatch all provisioned and managed by ECS) on the
  supported platform. After Phase 1 the backend is a plain stateless HTTP container
  (voice is browser-direct), so it needs none of the hand-rolled VPC/ALB/listener wiring
  in aws/chat-ecs-template.yaml. Replaces both that stack and aws/chat-apprunner-template.yaml.

Parameters:
  StageName:
    Type: String
    AllowedValues: [stage, prod]
    Default: stage
  ImageUri:
    Type: String
    Description: 'Full ECR image URI with tag, e.g. ACCT.dkr.ecr.us-east-2.amazonaws.com/gvp-chat:stage-abc1234'
  GeminiApiKey:
    Type: String
    NoEcho: true
    MinLength: 1
    Description: 'Gemini API key (NoEcho). Hardening follow-up: move to PrimaryContainer.Secrets (SSM SecureString / Secrets Manager).'
  ChatCorsOrigins:
    Type: String
    Default: 'https://chat.marwanelgendy.link,https://marwanelgendy.link,https://www.marwanelgendy.link'
  ChatTranscriptsTableName:
    Type: String
    Default: ''
    Description: DynamoDB transcripts table (page stack output). Empty disables persistence.
  SmokeProbeKey:
    Type: String
    NoEcho: true
    Default: ''
    Description: 'Probe-scoped key (distinct from the contact-admin key) that gates the deep /api/chat/smoke Live probe. Empty leaves the deep probe locked.'
  GeminiModel:
    Type: String
    Default: gemini-3.1-flash-lite
  GeminiFallbackModel:
    Type: String
    Default: gemma-4-26b-a4b-it
  GeminiLiveModel:
    Type: String
    Default: gemini-3.1-flash-live-preview
  ChatVoiceModel:
    Type: String
    Default: ''
  ResendApiKey:
    Type: String
    NoEcho: true
    Default: ''
    Description: 'Resend API key for instant chat-degradation alerts. Empty leaves alerts dark (no-op).'
  ChatAlertEmail:
    Type: String
    Default: ''
    Description: 'Recipient for instant chat alerts (model switch / timeout / rate-limit / breakage). Empty leaves alerts dark.'
  ChatAlertFromEmail:
    Type: String
    Default: ''
    Description: 'From address for instant chat alerts (a verified Resend sender). Empty leaves alerts dark.'
  ChatAlertCooldownSeconds:
    Type: String
    Default: ''
    Description: 'Throttle window per alert type in seconds (empty = default 3600).'
  ContainerPort:
    Type: Number
    Default: 8000
  Cpu:
    # ECS Fargate task-level units (string). 256 = 0.25 vCPU.
    Type: String
    Default: '256'
    AllowedValues: ['256', '512', '1024']
  Memory:
    # MiB (string). With Cpu=256, valid values are 512/1024/2048.
    Type: String
    Default: '512'
    AllowedValues: ['512', '1024', '2048']
  MinTaskCount:
    Type: Number
    Default: 1
  MaxTaskCount:
    Type: Number
    Default: 2

Conditions:
  HasTranscriptsTable: !Not [!Equals [!Ref ChatTranscriptsTableName, '']]
  IsStage: !Equals [!Ref StageName, 'stage']

Resources:
  # Pulls the image from ECR and writes container logs — the standard ECS task
  # execution role.
  ExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub gvp-chat-express-${StageName}-execution
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: ecs-tasks.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  # Identity ECS Express Mode assumes to provision/manage the ALB, target groups,
  # security groups, listeners, autoscaling and alarms on your behalf.
  InfrastructureRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub gvp-chat-express-${StageName}-infra
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: ecs.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSInfrastructureRoleforExpressGatewayServices

  # Identity the running container uses (boto3 -> DynamoDB transcripts). Mirrors the
  # ECS TaskRole / App Runner InstanceRole: PutItem/UpdateItem on the transcripts table only.
  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub gvp-chat-express-${StageName}-task
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: ecs-tasks.amazonaws.com }
            Action: sts:AssumeRole
      Policies:
        - !If
          - HasTranscriptsTable
          - PolicyName: TranscriptsWrite
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action: [dynamodb:PutItem, dynamodb:UpdateItem]
                  Resource: !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${ChatTranscriptsTableName}
          - !Ref AWS::NoValue

  Service:
    Type: AWS::ECS::ExpressGatewayService
    Properties:
      ServiceName: !Sub gvp-chat-${StageName}-express
      Cpu: !Ref Cpu
      Memory: !Ref Memory
      HealthCheckPath: /health
      ExecutionRoleArn: !GetAtt ExecutionRole.Arn
      InfrastructureRoleArn: !GetAtt InfrastructureRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      # NetworkConfiguration omitted -> Express uses the account's default VPC subnets/SGs.
      PrimaryContainer:
        Image: !Ref ImageUri
        ContainerPort: !Ref ContainerPort
        Environment:
          - { Name: CHAT_PROVIDER, Value: gemini }
          - { Name: GEMINI_LIVE_MINT_TIMEOUT_SEC, Value: '50' }
          - { Name: CHAT_CORS_ORIGINS, Value: !Ref ChatCorsOrigins }
          - { Name: GEMINI_API_KEY, Value: !Ref GeminiApiKey }
          - { Name: GEMINI_MODEL, Value: !Ref GeminiModel }
          - { Name: GEMINI_FALLBACK_MODEL, Value: !Ref GeminiFallbackModel }
          - { Name: GEMINI_LIVE_MODEL, Value: !Ref GeminiLiveModel }
          - { Name: CHAT_VOICE_MODEL, Value: !Ref ChatVoiceModel }
          - { Name: CHAT_TRANSCRIPTS_TABLE, Value: !Ref ChatTranscriptsTableName }
          - { Name: AWS_REGION, Value: !Ref AWS::Region }
          - { Name: CHAT_READY_VERBOSE, Value: !If [IsStage, '1', '0'] }
          - { Name: SMOKE_PROBE_KEY, Value: !Ref SmokeProbeKey }
          - { Name: CHAT_ENV, Value: !Ref StageName }
          - { Name: RESEND_API_KEY, Value: !Ref ResendApiKey }
          - { Name: CHAT_ALERT_EMAIL, Value: !Ref ChatAlertEmail }
          - { Name: CHAT_ALERT_FROM_EMAIL, Value: !Ref ChatAlertFromEmail }
          - { Name: CHAT_ALERT_COOLDOWN_SECONDS, Value: !Ref ChatAlertCooldownSeconds }
      ScalingTarget:
        MinTaskCount: !Ref MinTaskCount
        MaxTaskCount: !Ref MaxTaskCount
      Tags:
        - { Key: 'gvp:stage', Value: !Ref StageName }

Outputs:
  ServiceUrl:
    Description: Public HTTPS URL of the ECS Express chat service (managed *.ecs.<region>.on.aws domain).
    Value: !Sub https://${Service.Endpoint}
  Endpoint:
    Description: Bare endpoint host (no scheme), as returned by the Express service.
    Value: !GetAtt Service.Endpoint
  ServiceArn:
    Value: !GetAtt Service.ServiceArn
  TaskRoleArn:
    Value: !GetAtt TaskRole.Arn
